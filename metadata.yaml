apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: agent-engine-rp-pool2
spec:
  info:
    title: Agent Engine ADC POC
    version: 0.1.0
    source:
      repo: https://github.com/rickyxie0929/agent-engine-rp-pool2
      sourceType: git
  content: {}
  interfaces:
    variables:
      - name: tenant_project_id
        description: The tenant project ID where the resources will be deployed
        varType: string
        required: true
      - name: location
        description: The GCP location/region for the Cloud Run dry-run service
        varType: string
        required: true
  requirements:
    roles: []
    providerVersions:
      - source: hashicorp/google
        version: ">= 5.0"
      - source: hashicorp/google-beta
        version: ">= 5.0"
